kind = "web"
previewPath = "/"
title = "SewaSync"
version = "1.0.0"
id = "artifacts/sewasync"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26218

[services.development]
run = "pnpm --filter @workspace/sewasync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sewasync", "run", "build" ]
publicDir = "artifacts/sewasync/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26218"
BASE_PATH = "/"
